name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: npm install
      - run: bun build src/index.ts --compile --outfile chart-room-darwin-arm64
      - uses: softprops/action-gh-release@v2
        with:
          files: chart-room-darwin-arm64
          generate_release_notes: true
